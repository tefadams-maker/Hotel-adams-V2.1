name: Build Hotel Adams EXE

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install Flask Flask-SQLAlchemy openpyxl pyinstaller
          
      - name: Build EXE
        run: |
          pyinstaller --onedir --name HotelAdams --hidden-import=database app.py
          
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: HotelAdams-Windows
          path: dist/HotelAdams/
