name: Build Hotel Adams EXE

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v3
        
      - name: 🔍 List files (debug)
        run: |
          echo "=== Archivos en el repositorio ==="
          dir
          echo "=== Contenido de la carpeta ==="
          dir /s
          
      - name: 🐍 Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          
      - name: 📦 Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install Flask==2.3.0 Flask-SQLAlchemy==3.0.5 openpyxl==3.1.2 pyinstaller==5.13.0
          
      - name: 🔨 Build EXE with PyInstaller
        run: |
          echo "=== Verificando app.py ==="
          if exist app.py (echo "✓ app.py encontrado") else (echo "✗ app.py NO encontrado")
          
          pyinstaller ^
            --name HotelAdams ^
            --onefile ^
            --windowed ^
            --hidden-import=database ^
            --hidden-import=flask_sqlalchemy ^
            --hidden-import=openpyxl ^
            --collect-all flask ^
            app.py
            
      - name: 📤 Upload Artifact
        uses: actions/upload-artifact@v3
        with:
          name: HotelAdams-Windows
          path: dist/HotelAdams.exe
